<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Arnold & Loïc Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --night: #14142B;
    --night-2: #1E1E42;
    --sunset: #E8622C;
    --gold: #F2A65A;
    --teal: #1F7A6C;
    --cream: #F5EFE0;
    --line: rgba(245,239,224,0.14);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    background: var(--night);
    color: var(--cream);
    font-family: 'Space Grotesk', sans-serif;
    min-height:100vh;
    overflow-x:hidden;
  }
  body{
    background:
      radial-gradient(ellipse 900px 500px at 50% -10%, rgba(232,98,44,0.25), transparent 60%),
      linear-gradient(180deg, var(--night) 0%, var(--night-2) 100%);
  }

  header{
    padding: 28px 20px 18px;
    text-align:center;
    border-bottom: 1px solid var(--line);
  }
  .eyebrow{
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight:500;
    margin-bottom: 8px;
  }
  h1{
    font-family: 'Anton', sans-serif;
    font-weight:400;
    font-size: clamp(34px, 9vw, 52px);
    line-height: 0.95;
    letter-spacing: 0.01em;
    text-transform: uppercase;
    background: linear-gradient(180deg, var(--cream) 40%, var(--gold) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .sub{
    margin-top: 10px;
    font-size: 14.5px;
    color: rgba(245,239,224,0.65);
    max-width: 420px;
    margin-left:auto;
    margin-right:auto;
  }

  main{
    max-width: 480px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  /* Upload zone */
  .drop{
    position:relative;
    border: 1.5px dashed rgba(245,239,224,0.3);
    border-radius: 18px;
    padding: 34px 20px;
    text-align:center;
    cursor:pointer;
    transition: border-color .2s ease, background .2s ease;
    background: rgba(245,239,224,0.02);
  }
  .drop:active{ background: rgba(245,239,224,0.06); }
  .drop.filled{ border-style: solid; border-color: var(--teal); padding: 0; overflow:hidden; }
  .drop input{ display:none; }
  .drop-icon{
    width:44px; height:44px; margin: 0 auto 12px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--sunset), var(--gold));
    display:flex; align-items:center; justify-content:center;
    font-size: 20px;
  }
  .drop-label{ font-weight:700; font-size:15px; }
  .drop-hint{ font-size:12.5px; color: rgba(245,239,224,0.5); margin-top:4px; }

  #stage-wrap{ position:relative; display:none; }
  #stage-wrap.show{ display:block; }
  canvas{ display:block; width:100%; height:auto; border-radius:16px; }
  .badge{
    position:absolute; top:10px; left:10px;
    font-size: 10.5px; letter-spacing:0.08em; text-transform:uppercase;
    background: rgba(20,20,43,0.75);
    backdrop-filter: blur(4px);
    padding:5px 10px; border-radius:20px;
    border: 1px solid var(--line);
  }
  .reset-btn{
    position:absolute; top:10px; right:10px;
    width:30px; height:30px; border-radius:50%;
    background: rgba(20,20,43,0.75);
    border: 1px solid var(--line);
    color: var(--cream);
    font-size:15px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }

  /* Style picker */
  section.styles{ margin-top: 26px; }
  .section-title{
    font-size: 11.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(245,239,224,0.5);
    margin-bottom: 12px;
    display:flex; align-items:center; gap:10px;
  }
  .section-title::after{
    content:''; flex:1; height:1px; background: var(--line);
  }
  .style-grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .style-card{
    border-radius: 12px;
    padding: 12px 6px 10px;
    text-align:center;
    border: 1.5px solid var(--line);
    background: rgba(245,239,224,0.03);
    cursor:pointer;
    transition: transform .12s ease, border-color .15s ease;
  }
  .style-card:active{ transform: scale(0.96); }
  .style-card.active{
    border-color: var(--sunset);
    background: rgba(232,98,44,0.12);
  }
  .swatch{
    width:100%; height:34px; border-radius:8px; margin-bottom:8px;
  }
  .style-card span{ font-size:12px; font-weight:500; display:block; }
  .style-card small{ font-size:9.5px; color:rgba(245,239,224,0.45); }

  #sw-natural{ background: linear-gradient(135deg,#3a3a5c,#5a5a7c); }
  #sw-sunset{ background: linear-gradient(135deg,#E8622C,#F2A65A); }
  #sw-teal{ background: linear-gradient(135deg,#1F7A6C,#2d3b5c); }

  .actions{ margin-top: 26px; display:flex; gap:10px; }
  button.primary, button.ghost{
    flex:1;
    border:none;
    padding: 15px 12px;
    border-radius: 12px;
    font-family: inherit;
    font-weight:700;
    font-size: 14.5px;
    cursor:pointer;
  }
  button.primary{
    background: linear-gradient(135deg, var(--sunset), var(--gold));
    color: var(--night);
  }
  button.primary:disabled{ opacity:0.35; }
  button.ghost{
    background: transparent;
    border: 1.5px solid var(--line);
    color: var(--cream);
  }

  footer{
    text-align:center;
    padding: 20px;
    font-size: 11.5px;
    color: rgba(245,239,224,0.35);
  }

  @media (prefers-reduced-motion: no-preference){
    .style-card, .drop, .reset-btn{ transition-duration: .15s; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Studio de portrait</div>
  <h1>Arnold &amp; Loïc</h1>
  <p class="sub">Dépose ta photo, choisis une ambiance. La touche finale reste humaine.</p>
</header>

<main>
  <label class="drop" id="dropZone">
    <input type="file" id="fileInput" accept="image/*">
    <div id="dropInner">
      <div class="drop-icon">↑</div>
      <div class="drop-label">Charger une photo</div>
      <div class="drop-hint">Touche pour choisir dans la galerie</div>
    </div>
  </label>

  <div id="stage-wrap">
    <span class="badge" id="badge">Naturel</span>
    <span class="reset-btn" id="resetBtn">↺</span>
    <canvas id="stage"></canvas>
  </div>

  <section class="styles">
    <div class="section-title">Ambiance</div>
    <div class="style-grid">
      <div class="style-card active" data-style="natural">
        <div class="swatch" id="sw-natural"></div>
        <span>Naturel</span>
        <small>sans filtre</small>
      </div>
      <div class="style-card" data-style="sunset">
        <div class="swatch" id="sw-sunset"></div>
        <span>Coucher</span>
        <small>tons chauds</small>
      </div>
      <div class="style-card" data-style="teal">
        <div class="swatch" id="sw-teal"></div>
        <span>Tanganyika</span>
        <small>tons frais</small>
      </div>
    </div>
  </section>

  <div class="actions">
    <button class="ghost" id="newPhotoBtn">Nouvelle photo</button>
    <button class="primary" id="downloadBtn" disabled>Télécharger</button>
  </div>
</main>

<footer>Arnold &amp; Loïc Studio — traitement local, aucune image ne quitte ton téléphone</footer>

<script>
(function(){
  const fileInput = document.getElementById('fileInput');
  const dropZone = document.getElementById('dropZone');
  const stageWrap = document.getElementById('stage-wrap');
  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');
  const badge = document.getElementById('badge');
  const downloadBtn = document.getElementById('downloadBtn');
  const newPhotoBtn = document.getElementById('newPhotoBtn');
  const resetBtn = document.getElementById('resetBtn');
  const styleCards = document.querySelectorAll('.style-card');

  let originalImage = null;
  let currentStyle = 'natural';

  // Estilos: cada um define um gradiente de overlay + composite operation + ajuste de saturação simples
  const STYLES = {
    natural: null,
    sunset: {
      label: 'Coucher',
      gradient: [
        { stop: 0,   color: 'rgba(232,98,44,0.35)' },
        { stop: 0.5, color: 'rgba(242,166,90,0.12)' },
        { stop: 1,   color: 'rgba(20,20,43,0.45)' }
      ],
      composite: 'multiply',
      warmth: 18
    },
    teal: {
      label: 'Tanganyika',
      gradient: [
        { stop: 0,   color: 'rgba(31,122,108,0.30)' },
        { stop: 0.6, color: 'rgba(30,30,66,0.15)' },
        { stop: 1,   color: 'rgba(20,20,43,0.5)' }
      ],
      composite: 'soft-light',
      warmth: -12
    }
  };

  function loadImage(file){
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        originalImage = img;
        setupCanvas();
        render();
        stageWrap.classList.add('show');
        dropZone.style.display = 'none';
        downloadBtn.disabled = false;
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function setupCanvas(){
    const maxW = 900;
    const scale = Math.min(1, maxW / originalImage.width);
    canvas.width = originalImage.width * scale;
    canvas.height = originalImage.height * scale;
  }

  function render(){
    if(!originalImage) return;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.filter = 'none';

    const style = STYLES[currentStyle];

    if(style && style.warmth){
      // leve ajuste de temperatura via filtro CSS do canvas
      const sat = 1.08;
      ctx.filter = `saturate(${sat}) contrast(1.04)`;
    }

    ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
    ctx.filter = 'none';

    if(style){
      const grad = ctx.createLinearGradient(0, 0, canvas.width * 0.3, canvas.height);
      style.gradient.forEach(g => grad.addColorStop(g.stop, g.color));
      ctx.globalCompositeOperation = style.composite;
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.globalCompositeOperation = 'source-over';

      // vinheta subtil
      const vg = ctx.createRadialGradient(
        canvas.width/2, canvas.height/2, canvas.height*0.35,
        canvas.width/2, canvas.height/2, canvas.height*0.75
      );
      vg.addColorStop(0, 'rgba(0,0,0,0)');
      vg.addColorStop(1, 'rgba(0,0,0,0.28)');
      ctx.fillStyle = vg;
      ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    badge.textContent = style ? style.label : 'Naturel';
  }

  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => {
    if(e.target.files && e.target.files[0]) loadImage(e.target.files[0]);
  });

  styleCards.forEach(card => {
    card.addEventListener('click', () => {
      styleCards.forEach(c => c.classList.remove('active'));
      card.classList.add('active');
      currentStyle = card.dataset.style;
      render();
    });
  });

  newPhotoBtn.addEventListener('click', () => {
    originalImage = null;
    stageWrap.classList.remove('show');
    dropZone.style.display = 'flex';
    fileInput.value = '';
    downloadBtn.disabled = true;
    styleCards.forEach(c => c.classList.remove('active'));
    document.querySelector('[data-style="natural"]').classList.add('active');
    currentStyle = 'natural';
  });

  resetBtn.addEventListener('click', newPhotoBtn.onclick);

  downloadBtn.addEventListener('click', () => {
    const link = document.createElement('a');
    link.download = 'canvas-vivo-' + currentStyle + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
})();
</script>

</body>
</html>
